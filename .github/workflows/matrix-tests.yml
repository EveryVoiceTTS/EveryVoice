name: Run Matrix Tests

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: main

permissions:
  contents: read

jobs:
  matrix-ubuntu:
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: sox libsox-dev
      - uses: FedericoCarboni/setup-ffmpeg@37062fbf7149fc5578d6c57e08aed62458b375d6 # @v3.1, with tool cache
      - name: Install dependencies and EveryVoice itself
        run: |
          CUDA_TAG=cpu pip install -r requirements.torch.txt --find-links https://download.pytorch.org/whl/torch_stable.html
          pip install -e .[dev]
      - run: pip freeze
      - run: pip list
      - run: cd everyvoice && python run_tests.py dev

  matrix-macos:
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: macos-latest
    defaults:
      run:
        # Required for conda
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set up conda
        uses: conda-incubator/setup-miniconda@fc2d68f6413eb2d87b895e92f8584b5b94a10167 # v3.3.0
        with:
          python-version: ${{ matrix.python-version }}
          miniforge-version: latest
          conda-remove-defaults: true
      - run: conda install -y -c conda-forge sox ffmpeg
      - uses: actions/cache@v5
        with:
          path: ~/Library/Caches/pip
          key: pip-macos-${{ matrix.python-version }}
      - run: pip install -e .[dev]
      - run: python --version
      - run: pip freeze
      - run: pip list
      - run: cd everyvoice && python run_tests.py dev
